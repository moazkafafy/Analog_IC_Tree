<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analog IC Design — Multi-Instructor Knowledge Tree</title>
<style>
  :root {
    --hesham-deep:   #7A0000;
    --hesham-main:   #9B1C1C;
    --hesham-bright: #C0392B;
    --hesham-gold:   #D4A017;
    --youssef-deep:   #0a2463;
    --youssef-main:   #247ba0;
    --youssef-bright: #3498db;
    --youssef-gold:   #1ca3b8;
    --color-deep:   var(--hesham-deep);
    --color-main:   var(--hesham-main);
    --color-bright: var(--hesham-bright);
    --color-gold:   var(--hesham-gold);
    --white:      #FFFFFF;
    --off-white:  #FDF8F8;
    --warm-bg:    #F8F0F0;
    --text-dark:  #1A1A1A;
    --text-mid:   #4A4A4A;
    --text-muted: #8A7070;
    --border:     #E8D8D8;
    --shadow:     rgba(122,0,0,0.12);
    --green:      #1D6A40;
  }

  body.instructor-youssef {
    --color-deep:   var(--youssef-deep);
    --color-main:   var(--youssef-main);
    --color-bright: var(--youssef-bright);
    --color-gold:   var(--youssef-gold);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-y: scroll; scrollbar-gutter: stable; }
  body { font-family: 'Georgia', serif; background: var(--white); color: var(--text-dark); min-height: 100vh; }

  header { background: var(--color-deep); padding: 28px 40px 28px; position: relative; overflow: hidden; transition: background 0.3s; min-height: 240px; contain: layout style; }
  header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent 0, transparent 38px, rgba(255,255,255,0.03) 38px, rgba(255,255,255,0.03) 40px), repeating-linear-gradient(0deg, transparent 0, transparent 38px, rgba(255,255,255,0.03) 38px, rgba(255,255,255,0.03) 40px); pointer-events: none; }
  .header-inner { position: relative; max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 260px; gap: 0 32px; align-items: start; }
  .header-left { display: flex; flex-direction: column; min-width: 0; }
  .header-right { display: flex; flex-direction: column; gap: 14px; width: 260px; }
  header h1 { font-family: 'Courier New', monospace; font-size: 1.85rem; font-weight: 700; color: #fff; letter-spacing: 0.04em; }
  header h1 span { color: var(--color-gold); transition: color 0.3s; }
  header p { margin-top: 4px; font-size: 0.78rem; color: rgba(255,255,255,0.48); font-family: 'Courier New', monospace; letter-spacing: 0.06em; }

  @media (max-width: 700px) {
    header { padding: 20px 16px 20px; min-height: unset; contain: none; }
    .header-inner { grid-template-columns: 1fr; gap: 16px 0; }
    .header-right { width: 100%; }
    .ctrl-btns.stacked { grid-template-columns: 1fr 1fr; }
    .ctrl-btns.two-col { grid-template-columns: 1fr 1fr; }
    header h1 { font-size: 1.2rem; }
    header p { font-size: 0.7rem; }
    .ctrl-btn { font-size: 0.65rem; padding: 6px 6px; }
    .ctrl-label { font-size: 0.58rem; }
    main { padding: 16px 12px 60px; }
    .node-row { padding: 8px 10px 8px 8px; }
    .node-title { font-size: 0.8rem; }
  }
  .header-badges { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
  .hbadge { background: rgba(255,255,255,0.1); border: 1px solid var(--color-gold); color: var(--color-gold); font-family: 'Courier New', monospace; font-size: 0.66rem; letter-spacing: 0.08em; padding: 3px 9px; border-radius: 2px; transition: color 0.3s, border-color 0.3s; }

  .ctrl-group { display: flex; flex-direction: column; gap: 5px; width: 100%; }
  .ctrl-label { font-family: 'Courier New', monospace; font-size: 0.62rem; color: rgba(255,255,255,0.38); letter-spacing: 0.08em; text-transform: uppercase; }
  .ctrl-btns { display: grid; gap: 5px; width: 100%; }
  .ctrl-btns.stacked { grid-template-columns: 1fr; }
  .ctrl-btns.two-col { grid-template-columns: 1fr 1fr; }
  .ctrl-group.hidden { visibility: hidden; pointer-events: none; }
  .ctrl-btn { font-family: 'Courier New', monospace; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; padding: 8px 10px; border-radius: 3px; border: 1.5px solid rgba(255,255,255,0.25); background: transparent; color: rgba(255,255,255,0.65); cursor: pointer; transition: background-color 0.18s, color 0.18s, border-color 0.18s; outline: none; line-height: 1.1; text-align: center; width: 100%; will-change: background-color, color, border-color; }
  .ctrl-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.95); border-color: rgba(255,255,255,0.4); }
  .ctrl-btn.active { background: var(--color-gold); color: var(--color-deep); border-color: var(--color-gold); }

  main { max-width: 1000px; margin: 0 auto; padding: 32px 24px 80px; }
  .search-wrap { margin-bottom: 24px; position: relative; }
  #tree-search { width: 100%; padding: 10px 16px 10px 40px; font-family: 'Courier New', monospace; font-size: 0.82rem; background: var(--off-white); border: 1.5px solid var(--border); border-radius: 4px; color: var(--text-dark); outline: none; transition: border-color 0.18s; }
  #tree-search:focus { border-color: var(--color-main); box-shadow: 0 0 0 3px rgba(155,28,28,0.15); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; pointer-events: none; }

  .section-header { font-family: 'Courier New', monospace; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-deep); padding: 6px 0 6px 2px; margin: 24px 0 6px; border-bottom: 2px solid var(--color-deep); display: flex; align-items: center; gap: 8px; transition: color 0.3s, border-color 0.3s; }
  .section-header:first-child { margin-top: 0; }

  .tree { list-style: none; }
  .tree-node { position: relative; }
  .tree-node > .children-wrap { position: relative; padding-left: 28px; }
  .tree-node > .children-wrap::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 12px; width: 2px; background: linear-gradient(to bottom, var(--color-main), transparent); border-radius: 1px; transition: background 0.3s; }
  .children-wrap > .tree-node > .node-row::before { content: ''; position: absolute; left: -18px; top: 50%; width: 18px; height: 2px; background: var(--color-main); transform: translateY(-50%); opacity: 0.5; transition: background 0.3s; }

  .node-row { position: relative; display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 9px 14px 9px 12px; margin: 3px 0; border-radius: 4px; border: 1px solid transparent; transition: background-color 0.15s, border-color 0.15s, box-shadow 0.15s; user-select: none; }
  .node-row:hover { background: var(--warm-bg); border-color: var(--border); box-shadow: 0 2px 8px var(--shadow); }
  .node-row.open { background: var(--off-white); border-color: var(--color-main); }

  .toggle-icon { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--color-deep); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .toggle-icon svg { width: 10px; height: 10px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; transition: transform 0.22s; }
  .node-row.open .toggle-icon { background: var(--color-bright); }
  .node-row.open .toggle-icon svg { transform: rotate(90deg); }
  .leaf .toggle-icon { background: transparent; border: 1.5px solid var(--border); opacity: 0.5; }
  .leaf .toggle-icon svg { stroke: var(--text-muted); opacity: 0.5; }

  .node-label { flex: 1; font-family: 'Courier New', monospace; line-height: 1.35; min-width: 0; }
  .node-title { display: block; font-size: 0.88rem; font-weight: 700; color: var(--text-dark); }

  .badges { display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 1; align-items: center; justify-content: flex-end; }
  .badge { font-family: 'Courier New', monospace; font-size: 0.6rem; letter-spacing: 0.03em; padding: 2px 6px; border-radius: 2px; text-decoration: none; font-weight: 700; cursor: pointer; border: 1px solid; display: inline-flex; align-items: center; gap: 2px; transition: opacity 0.15s; white-space: nowrap; }
  .badge:hover { opacity: 0.78; }
  .badge-slides { background: rgba(184,134,11,0.1); color: var(--color-gold); border-color: rgba(184,134,11,0.3); }
  .badge-instructor { background: rgba(155,28,28,0.1); color: var(--color-main); border-color: rgba(155,28,28,0.3); }

  .node-detail { margin: 2px 0 5px; padding: 9px 14px; background: var(--warm-bg); border-left: 3px solid var(--color-main); border-radius: 0 4px 4px 0; font-size: 0.77rem; color: var(--text-mid); font-family: 'Courier New', monospace; line-height: 1.55; display: none; transition: border-color 0.3s; }
  .node-detail.visible { display: block; }

  .video-item { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; margin: 3px 3px 3px 0; background: rgba(29,106,64,0.08); border: 1px solid rgba(29,106,64,0.25); border-radius: 3px; font-family: 'Courier New', monospace; font-size: 0.7rem; color: var(--green); text-decoration: none; cursor: pointer; transition: all 0.15s; }
  .video-item:hover { background: rgba(29,106,64,0.15); border-color: rgba(29,106,64,0.5); }
  .video-item::before { content: '▶'; font-size: 0.55rem; flex-shrink: 0; }
  .videos-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

  .children-wrap { overflow: hidden; max-height: 0; transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1); }
  .children-wrap.open { max-height: 4000px; }

  footer { text-align: center; padding: 18px; font-family: 'Courier New', monospace; font-size: 0.65rem; color: var(--text-muted); border-top: 1px solid var(--border); }
</style>
</head>

<header>
  <div class="header-inner">
    <div class="header-left">
      <h1>Analog IC Design — <span>Knowledge Tree</span></h1>
      <p>// Multi-Instructor Learning Platform · Interactive Study Map</p>
      <div class="header-badges">
        <span class="hbadge">LECTURES</span>

      </div>
    </div>
    <div class="header-right">
      <div class="ctrl-group">
        <div class="ctrl-label">Instructor</div>
        <div class="ctrl-btns stacked">
          <button class="ctrl-btn instructor-btn active" data-instructor="hesham">Dr. Hesham Omran</button>
          <button class="ctrl-btn instructor-btn" data-instructor="youssef">Dr. Mohamed Youssef</button>
          <button class="ctrl-btn instructor-btn" data-instructor="all">Compare Both</button>
        </div>
      </div>
      <div class="ctrl-group" id="course-panel">
        <div class="ctrl-label">Course</div>
        <div class="ctrl-btns two-col">
          <button class="ctrl-btn course-btn active" data-course="1">Analog (1)</button>
          <button class="ctrl-btn course-btn" data-course="2">Analog (2)</button>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">View Mode</div>
        <div class="ctrl-btns two-col">
          <button class="ctrl-btn mode-btn active" data-mode="split">⊞ Theory</button>
          <button class="ctrl-btn mode-btn" data-mode="topic">◈ By Topic</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="tree-search" placeholder="Search lectures..." autocomplete="off" />
  </div>
  <ul class="tree" id="tree-root"></ul>
</main>

<footer>Master Micro · Cairo University · Multi-Instructor Learning Platform</footer>

const LABS_HESHAM = [];

const LECTURES_YOUSSEF = [
  {id:'y_diff5t',instructor:'youssef',topicKey:'diff_amp',title:'Differential Amplifier & 5T OTA',videos:[{label:'Part 1',href:'https://youtu.be/DiqeyeDK7Kw?si=B2RV2VXbc6vSoiSI'},{label:'Part 2',href:'https://youtu.be/5lTEbmP6ojE?si=lhBKKL-OdU_8FlA1'},{label:'Part 3',href:'https://youtu.be/UW4CkRrBRyk?si=B2RV2VXbc6vSoiSI'},{label:'Part 4 (till 35:40)',href:'https://youtu.be/YNLfrxUCHaA?si=o-vCeDHMG-lpN4kj'}],slides:null},
  {id:'y_freq',instructor:'youssef',topicKey:'freq_resp',title:'Frequency Response',videos:[{label:'Part 1',href:'https://youtu.be/iJr7uilpSk8?si=CX868dARlFlm6dz7'},{label:'Part 2',href:'https://youtu.be/yDZpNx7dpCk?si=lhBKKL-OdU_8FlA1'},{label:'Part 3',href:'https://youtu.be/mWG8aXcP6x0?si=B2RV2VXbc6vSoiSI'},{label:'Part 4',href:'https://youtu.be/EVDZfyxgFiY?si=gA8bUpyBLG5AumOV'},{label:'Part 5',href:'https://youtu.be/I1jP8KCZUKA?si=gA8bUpyBLG5AumOV'},{label:'Part 6',href:'https://youtu.be/_AgVLosYig8?si=AEp1hjx5IRbQfqGs'}],slides:null},
  {id:'y_cm',instructor:'youssef',topicKey:'current_mirrors',title:'Current Mirrors',videos:[{label:'Part 1',href:'https://youtu.be/tPsGZEvHf4U?si=cj4Z29dKWA5OJVQ9'},{label:'Part 2',href:'https://youtu.be/1Yy62cxH0to?si=mwtd47vBktyASWi4'}],slides:null},
  {id:'y_negfb',instructor:'youssef',topicKey:'feedback',title:'Negative Feedback',videos:[{label:'Part 1',href:'https://youtu.be/esZCiz3vpUM?si=2ik7h13VNQFVtdWF'},{label:'Part 2',href:'https://youtu.be/qOj-FbKHgAQ?si=zFmcRgzkiVdL7GvU'},{label:'Part 3 (till 18:05)',href:'https://youtu.be/H4eeEm38hOY?si=z1P45c8PVNLxhSjI'}],slides:null},
  {id:'y_osc',instructor:'youssef',topicKey:'oscillators',title:'Oscillators',videos:[{label:'Part 1',href:'https://youtu.be/qOj-FbKHgAQ?si=L_uEbv5hEQJwMxff&t=1085'},{label:'Part 2',href:'https://youtu.be/Cgie-e6dXus?si=URCaKcJQ03h1SD2z'}],slides:null},
];

let currentInstructor = 'hesham';
let currentMode = 'split';
let currentCourse = 1;
let slidesCache = {}; // Will store auto-fetched slide URLs

// Fetch slides from Google Apps Script
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDy2AE2Rv1m8oYQkY-agKs6InVR5tJ2gE06mUhw3LHyFKqFgruq-04oYgSmuW7QXkilg/exec';

fetch(SCRIPT_URL)
  .then(r => r.json())
  .then(data => {
    slidesCache = data;
    console.log('✓ Slides loaded:', Object.keys(data).length, 'lectures found');
    render(); // Re-render with correct slide links
  })
  .catch(e => console.warn('Could not auto-fetch slides:', e));

document.querySelectorAll('.instructor-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const inst = btn.dataset.instructor;
    if (inst === currentInstructor) return;
    document.querySelectorAll('.instructor-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentInstructor = inst;
    document.body.classList.toggle('instructor-youssef', inst === 'youssef');
    document.getElementById('course-panel').classList.toggle('hidden', inst !== 'hesham');
    render();
  });
});

document.querySelectorAll('.course-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const course = parseInt(btn.dataset.course);
    if (course === currentCourse) return;
    document.querySelectorAll('.course-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCourse = course;
    render();
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    if (mode === currentMode) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = mode;
    render();
  });
});

function render() {
  const root = document.getElementById('tree-root');
  root.innerHTML = '';
  
  let lecs = currentInstructor === 'hesham' ? LECTURES_HESHAM : currentInstructor === 'youssef' ? LECTURES_YOUSSEF : [...LECTURES_HESHAM, ...LECTURES_YOUSSEF];
  
  // Filter by course for Hesham
  if (currentInstructor === 'hesham') {
    const lecNum = (l) => parseInt(l.id.replace('lec', ''));
    lecs = lecs.filter(l => {
      const num = lecNum(l);
      return currentCourse === 1 ? num <= 14 : num > 14;
    });
  }
  
  if (currentMode === 'topic') {
    const grouped = {};
    lecs.forEach(l => {
      if (!grouped[l.topicKey]) grouped[l.topicKey] = [];
      grouped[l.topicKey].push(l);
    });
    const h = document.createElement('div');
    h.className = 'section-header';
    h.textContent = `TOPICS (${Object.keys(grouped).length})`;
    root.appendChild(h);
    const ul = document.createElement('ul');
    ul.className = 'tree';
    Object.keys(grouped).sort().forEach(key => {
      const node = document.createElement('li');
      node.className = 'tree-node';
      const row = document.createElement('div');
      row.className = 'node-row';
      row.innerHTML = `<div class="toggle-icon"><svg viewBox="0 0 10 10"><polyline points="3,2 7,5 3,8"/></svg></div><div class="node-label"><span class="node-title">${key.replace(/_/g,' ').toUpperCase()}</span></div>`;
      node.appendChild(row);
      const wrap = document.createElement('div');
      wrap.className = 'children-wrap';
      const subl = document.createElement('ul');
      subl.className = 'tree';
      grouped[key].forEach(l => subl.appendChild(buildLecture(l)));
      wrap.appendChild(subl);
      node.appendChild(wrap);
      row.addEventListener('click', () => {
        row.classList.toggle('open');
        wrap.classList.toggle('open');
      });
      ul.appendChild(node);
    });
    root.appendChild(ul);
  } else {
    const h = document.createElement('div');
    h.className = 'section-header';
    h.textContent = `LECTURES (${lecs.length})`;
    root.appendChild(h);
    const ul = document.createElement('ul');
    ul.className = 'tree';
    lecs.forEach(l => ul.appendChild(buildLecture(l)));
    root.appendChild(ul);
  }
}

async function getYouTubeTitle(url) {
  if (!url) return null;
  try {
    const response = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
    const data = await response.json();
    return data.title || null;
  } catch (e) {
    return null;
  }
}

function buildLecture(l) {
  // Ensure labs property exists
  if (!l.labs) l.labs = [];
  
  const node = document.createElement('li');
  node.className = 'tree-node';
  const row = document.createElement('div');
  row.className = 'node-row' + (l.videos.length === 0 && l.labs.length === 0 ? ' leaf' : '');
  row.innerHTML = `<div class="toggle-icon"><svg viewBox="0 0 10 10"><polyline points="3,2 7,5 3,8"/></svg></div><div class="node-label"><span class="node-title">${l.title}${l.sub ? '<span class="node-sub">' + l.sub + '</span>' : ''}</span></div>`;
  const badges = document.createElement('div');
  badges.className = 'badges';
  
  // Add labs badge FIRST (left side) if lecture has labs
  if (l.labs && l.labs.length > 0) {
    const firstLabLabel = l.labs[0].label;
    // Extract lab number from label like "Lab 01 (Part 1): ..." → "Lab 01"
    const labMatch = firstLabLabel.match(/Lab\s+\d+/);
    const labNumber = labMatch ? labMatch[0] : 'Lab';
    
    const lb = document.createElement('a');
    lb.className = 'badge badge-labs';
    lb.style.background = '#c23b22';
    lb.style.borderColor = '#d65c45';
    lb.style.color = '#fff';
    lb.style.fontWeight = '700';
    lb.textContent = labNumber;
    lb.style.cursor = 'pointer';
    lb.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      row.click(); // Expand the lecture
    });
    badges.appendChild(lb);
  }
  
  // Add slides badge LAST (right side, always on the right)
  // Try to use auto-fetched slide URL first, fallback to SLIDES constant
  let slideUrl = l.slides;
  if (l.instructor === 'hesham') {
    const lecMatch = l.id.match(/lec(\d+)/);
    if (lecMatch) {
      const lecNum = parseInt(lecMatch[1]);
      if (slidesCache[lecNum]) {
        slideUrl = slidesCache[lecNum].url;
      }
    }
  }
  
  if (slideUrl) {
    const sb = document.createElement('a');
    sb.className = 'badge badge-slides';
    sb.href = slideUrl;
    sb.target = '_blank';
    sb.textContent = '◈ Slides';
    badges.appendChild(sb);
  }
  
  if (currentMode === 'topic' && currentInstructor === 'all') {
    const ib = document.createElement('span');
    ib.className = 'badge badge-instructor';
    ib.textContent = l.instructor === 'hesham' ? 'HESHAM' : 'YOUSSEF';
    badges.appendChild(ib);
  }
  row.appendChild(badges);
  
  node.appendChild(row);
  
  if (l.videos.length > 0 || l.labs.length > 0) {
    const wrap = document.createElement('div');
    wrap.className = 'children-wrap';
    const detail = document.createElement('div');
    detail.className = 'node-detail';
    
    // Videos
    if (l.videos.length > 0) {
      const vlist = document.createElement('div');
      vlist.className = 'videos-list';
      l.videos.forEach((v, idx) => {
        const vi = document.createElement('a');
        vi.className = 'video-item';
        
        // For Hesham lectures, fetch YouTube title; for Youssef, use label
        if (l.instructor === 'hesham' && v.href) {
          vi.textContent = '⏳ Loading...';
          getYouTubeTitle(v.href).then(title => {
            if (title) vi.textContent = title;
            else vi.textContent = v.label; // fallback to label
          });
        } else {
          vi.textContent = v.label;
        }
        
        if (v.href) { vi.href = v.href; vi.target = '_blank'; vi.rel = 'noopener'; } else { vi.style.opacity = '0.5'; vi.style.cursor = 'default'; }
        vlist.appendChild(vi);
      });
      detail.appendChild(vlist);
    }
    
    // Labs
    if (l.labs.length > 0) {
      const llist = document.createElement('div');
      llist.className = 'labs-list';
      llist.style.marginTop = '10px';
      llist.style.paddingTop = '10px';
      llist.style.borderTop = '1px solid var(--border)';
      l.labs.forEach(lab => {
        // Main lab file
        const li = document.createElement('a');
        li.className = 'video-item';
        li.style.background = 'rgba(184,134,11,0.08)';
        li.style.borderColor = 'rgba(184,134,11,0.25)';
        li.style.color = 'var(--color-gold)';
        li.textContent = lab.label;
        if (lab.href) { li.href = lab.href; li.target = '_blank'; li.rel = 'noopener'; }
        llist.appendChild(li);
        
        // Additional files if they exist
        if (lab.files && lab.files.length > 0) {
          lab.files.forEach(f => {
            const fi = document.createElement('a');
            fi.className = 'video-item';
            fi.style.background = 'rgba(184,134,11,0.05)';
            fi.style.borderColor = 'rgba(184,134,11,0.15)';
            fi.style.color = 'rgba(212,160,23,0.8)';
            fi.style.fontSize = '0.85em';
            fi.style.marginLeft = '12px';
            fi.textContent = '↳ ' + f.name + ' [' + f.type.toUpperCase() + ']';
            if (f.href) { fi.href = f.href; fi.target = '_blank'; fi.rel = 'noopener'; }
            llist.appendChild(fi);
          });
        }
      });
      detail.appendChild(llist);
    }
    
    wrap.appendChild(detail);
    node.appendChild(wrap);
    row.addEventListener('click', () => {
      row.classList.toggle('open');
      wrap.classList.toggle('open');
      detail.classList.toggle('visible');
    });
  }
  return node;
}

render();
</script>
</body>
